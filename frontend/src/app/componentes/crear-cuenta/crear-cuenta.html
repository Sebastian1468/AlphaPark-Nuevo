<div class="auth-screen">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="icon-square"><i class="bi bi-car-front-fill"></i></div>
            <div>
                <h2>AlphaPark</h2>
                <p>Sistema de Gestión de Estacionamientos</p>
            </div>
        </div>

        <div class="auth-header">
            <h3><i class="bi bi-person-plus"></i> Crear Cuenta</h3>
            <p>Regístrate como Empleado o como Gerente</p>
        </div>

        <div class="auth-body">
            <div class="input-group">
                <label>Tipo de cuenta</label>
                <div class="role-toggle">
                    <div class="role-option" [class.selected]="rol === 'Empleado'" (click)="seleccionarRol('Empleado')">
                        <i class="bi bi-person-badge"></i> Empleado
                    </div>
                    <div class="role-option" [class.selected]="rol === 'Gerente'" (click)="seleccionarRol('Gerente')">
                        <i class="bi bi-graph-up"></i> Gerente
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" class="input-field" placeholder="nombre.usuario" [(ngModel)]="nombreUsuario">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="input-field" placeholder="Mínimo 6 caracteres" [(ngModel)]="password">
            </div>

            <div class="input-group">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" class="input-field" placeholder="Repite la contraseña" [(ngModel)]="confirmarPassword" (keyup.enter)="registrar()">
            </div>

            <p class="auth-error" *ngIf="error"><i class="bi bi-exclamation-circle"></i> {{ error }}</p>
            <p class="auth-success" *ngIf="exito"><i class="bi bi-check-circle"></i> {{ exito }}</p>

            <button class="btn-submit" (click)="registrar()" [disabled]="cargando">
                <i class="bi" [ngClass]="cargando ? 'bi-hourglass-split' : 'bi-person-plus'"></i>
                {{ cargando ? 'Creando cuenta...' : 'Crear Cuenta' }}
            </button>

            <p class="auth-switch">
                ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>
