<div class="auth-screen">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="icon-square"><i class="bi bi-car-front-fill"></i></div>
            <div>
                <h2>AlphaPark</h2>
                <p>Sistema de Gestión de Estacionamientos</p>
            </div>
        </div>

        <div class="auth-header">
            <h3><i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión</h3>
            <p>Ingresa con tu cuenta de Empleado o Gerente</p>
        </div>

        <div class="auth-body">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" class="input-field" placeholder="nombre.usuario"
                    [(ngModel)]="nombreUsuario" (keyup.enter)="ingresar()">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••"
                    [(ngModel)]="password" (keyup.enter)="ingresar()">
            </div>

            <p class="auth-error" *ngIf="error"><i class="bi bi-exclamation-circle"></i> {{ error }}</p>

            <button class="btn-submit" (click)="ingresar()" [disabled]="cargando">
                <i class="bi" [ngClass]="cargando ? 'bi-hourglass-split' : 'bi-box-arrow-in-right'"></i>
                {{ cargando ? 'Ingresando...' : 'Ingresar' }}
            </button>

            <p class="auth-switch">
                ¿No tienes cuenta? <a routerLink="/crear-cuenta">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
