<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaPark - Registrar Entrada</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <header class="panel-header">
    <div class="brand-box">
        <div class="icon-square"><i class="bi bi-car-front-fill"></i></div>
        <div>
            <h2>AlphaPark</h2>
            <p>Sistema de Gestión de Estacionamientos</p>
        </div>
    </div>
</header>

<nav class="panel-nav">
    <a routerLink="/registro" class="nav-item active"><i class="bi bi-plus-circle-fill"></i> Registrar Entrada</a>
    <a routerLink="/mapa" class="nav-item"><i class="bi bi-geo-alt-fill"></i> Mapa Ocupación</a>
    <a routerLink="/activos" class="nav-item"><i class="bi bi-car-front"></i> Vehículos Activos</a>
    <a routerLink="/historial" class="nav-item"><i class="bi bi-clock-history"></i> Historial</a>
</nav>

<main class="main-content">
    <div class="form-card">
        <div class="form-card-header">
            <h3><i class="bi bi-plus-circle"></i> Registrar Entrada</h3>
            <p>Generar ticket de ingreso para un nuevo vehículo</p>
        </div>
        
        <div class="form-body">
            <div class="input-group">
                <label for="placa">Placa</label>
                <input type="text" id="placa" class="input-field" placeholder="ABC-123" [(ngModel)]="placaVehiculo">
                <span class="input-hint">Ingresa la placa del vehículo para registrar su ingreso.</span>
            </div>
            
            <button class="btn-submit" (click)="generarTicket()">
                <i class="bi bi-printer"></i> Generar Ticket de Entrada
            </button>
        </div>
    </div>
</main>

</body>
</html>
