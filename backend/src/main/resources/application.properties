
spring.application.name=alphapark-backend
server.port=${PORT:3000}

# --- Base de datos MySQL ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:alphapark_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- Jackson (serializacion JSON) ---
# El frontend en Angular espera snake_case (placa_vehiculo, id_ticket, etc.)

spring.jackson.property-naming-strategy=SNAKE_CASE

# --- CORS ---
alphapark.cors.allowed-origins=${CORS_ORIGINS:*}
